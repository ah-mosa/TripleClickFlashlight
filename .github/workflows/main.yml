name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/example/flashlight
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.flashlight">
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.FLASHLIGHT"/>
              <application android:label="Triple Click Flashlight" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create MainActivity.kt
          cat > app/src/main/java/com/example/flashlight/MainActivity.kt << 'EOF'
          package com.example.flashlight
          
          import android.Manifest
          import android.content.pm.PackageManager
          import android.hardware.camera2.CameraManager
          import android.os.Bundle
          import android.widget.Button
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          
          class MainActivity : AppCompatActivity() {
              private lateinit var cameraManager: CameraManager
              private var isFlashOn = false
              
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  cameraManager = getSystemService(CAMERA_SERVICE) as CameraManager
                  
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                      != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.CAMERA), 100)
                  }
                  
                  findViewById<Button>(R.id.btnFlash).setOnClickListener {
                      toggleFlashlight()
                  }
              }
              
              private fun toggleFlashlight() {
                  try {
                      val cameraId = cameraManager.cameraIdList[0]
                      if (isFlashOn) {
                          cameraManager.setTorchMode(cameraId, false)
                          isFlashOn = false
                          Toast.makeText(this, "الفلاش إيقاف", Toast.LENGTH_SHORT).show()
                      } else {
                          cameraManager.setTorchMode(cameraId, true)
                          isFlashOn = true
                          Toast.makeText(this, "الفلاش تشغيل", Toast.LENGTH_SHORT).show()
                      }
                  } catch (e: Exception) {
                      Toast.makeText(this, "خطأ: ${e.message}", Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF
          
          # Create activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:orientation="vertical"
              android:background="#1a1a2e">
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🔦"
                  android:textSize="64sp"
                  android:layout_marginBottom="24dp"/>
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Triple Click Flashlight"
                  android:textSize="22sp"
                  android:textStyle="bold"
                  android:textColor="#ffffff"
                  android:layout_marginBottom="16dp"/>
              
              <Button
                  android:id="@+id/btnFlash"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="تشغيل الفلاش"
                  android:textSize="18sp"
                  android:paddingLeft="32dp"
                  android:paddingRight="32dp"
                  android:paddingTop="12dp"
                  android:paddingBottom="12dp"/>
          </LinearLayout>
          EOF
          
          # Create build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # Create app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.example.flashlight'
              compileSdk 33
              
              defaultConfig {
                  applicationId 'com.example.flashlight'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
              }
              kotlinOptions {
                  jvmTarget = '11'
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.9.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          # Create settings.gradle
          echo 'include ":app"' > settings.gradle
          
          # Create gradle wrapper properties
          mkdir -p gradle/wrapper
          echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip' > gradle/wrapper/gradle-wrapper.properties
      
      - name: Grant execute permission
        run: chmod +x gradlew || true
      
      - name: Build APK
        run: |
          # Create gradle wrapper if not exists
          if [ ! -f gradlew ]; then
            wget -q https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew
            chmod +x gradlew
          fi
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TripleClickFlashlight
          path: app/build/outputs/apk/debug/*.apk
