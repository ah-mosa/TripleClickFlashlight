name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Android project files
        run: |
          # إنشاء هيكل المجلدات
          mkdir -p app/src/main/java/com/example/flashlight
          mkdir -p app/src/main/res/layout
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.flashlight">
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.FLASHLIGHT"/>
              <application android:label="Triple Click Flashlight" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # MainActivity.kt
          cat > app/src/main/java/com/example/flashlight/MainActivity.kt << 'EOF'
          package com.example.flashlight
          
          import android.Manifest
          import android.content.pm.PackageManager
          import android.hardware.camera2.CameraManager
          import android.os.Bundle
          import android.widget.Button
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.content.ContextCompat
          
          class MainActivity : AppCompatActivity() {
              private lateinit var cameraManager: CameraManager
              private var isFlashOn = false
              
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  cameraManager = getSystemService(CAMERA_SERVICE) as CameraManager
                  
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                      != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.CAMERA), 100)
                  }
                  
                  findViewById<Button>(R.id.btnFlash).setOnClickListener {
                      toggleFlashlight()
                  }
              }
              
              private fun toggleFlashlight() {
                  try {
                      val cameraId = cameraManager.cameraIdList[0]
                      if (isFlashOn) {
                          cameraManager.setTorchMode(cameraId, false)
                          isFlashOn = false
                          Toast.makeText(this, "الفلاش إيقاف", Toast.LENGTH_SHORT).show()
                      } else {
                          cameraManager.setTorchMode(cameraId, true)
                          isFlashOn = true
                          Toast.makeText(this, "الفلاش تشغيل", Toast.LENGTH_SHORT).show()
                      }
                  } catch (e: Exception) {
                      Toast.makeText(this, "خطأ: ${e.message}", Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF
          
          # activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:orientation="vertical"
              android:background="#1a1a2e">
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="🔦"
                  android:textSize="64sp"
                  android:layout_marginBottom="24dp"/>
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Triple Click Flashlight"
                  android:textSize="22sp"
                  android:textStyle="bold"
                  android:textColor="#ffffff"
                  android:layout_marginBottom="16dp"/>
              
              <Button
                  android:id="@+id/btnFlash"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="تشغيل الفلاش"
                  android:textSize="18sp"
                  android:paddingLeft="32dp"
                  android:paddingRight="32dp"
                  android:paddingTop="12dp"
                  android:paddingBottom="12dp"/>
          </LinearLayout>
          EOF
      
      - name: Create gradle files
        run: |
          # build.gradle (root)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # app/build.gradle
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 33
              
              defaultConfig {
                  applicationId 'com.example.flashlight'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          # settings.gradle
          echo 'include ":app"' > settings.gradle
      
      - name: Setup Android SDK
        run: |
          # إزالة المتغيرات المتضاربة
          unset ANDROID_HOME
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          
          # تحميل Android SDK
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          
          # قبول التراخيص
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # تثبيت المتطلبات
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" > /dev/null 2>&1
          
          # حفظ المتغيرات
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV
      
      - name: Build APK
        run: |
          # تحميل Gradle
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          
          # بناء APK
          ./gradle-8.0/bin/gradle build
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TripleClickFlashlight
          path: app/build/outputs/apk/debug/*.apk
